<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google 搜尋趨勢分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F5EFE6; color:#2C1E0F; }
.header { background:#FDFAF5; padding:20px 28px; border-bottom:1px solid #E5D9C8; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:12px; color:#9B8670; margin-top:3px; }
.back-link { font-size:12px; color:#B87030; text-decoration:none; }

.filter-bar { background:#FDFAF5; border-bottom:1px solid #E5D9C8; padding:10px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.date-bar { background:#F7F1E8; border-bottom:1px solid #E5D9C8; padding:8px 28px; display:flex; align-items:center; gap:8px; }
.date-btn { padding:4px 12px; border-radius:20px; border:1px solid #D5C5B0; background:#FDFAF5; font-size:11px; color:#5C4A32; cursor:pointer; }
.date-btn.active { background:#B87030; color:#fff; border-color:#B87030; }
.date-info { margin-left:auto; font-size:11px; color:#A89070; }
.filter-label { font-size:12px; font-weight:600; color:#8B7355; white-space:nowrap; }
.region-toggle { display:flex; gap:4px; }
.region-btn { padding:5px 14px; border-radius:20px; border:1px solid #e5e5e5; background:#FDFAF5; font-size:11px; font-weight:600; color:#5C4A32; cursor:pointer; }
.region-btn.active { background:#5C3D2E; color:#fff; border-color:#2C1E0F; }
.kw-chips { display:flex; gap:6px; flex-wrap:wrap; }
.kw-chip { padding:4px 12px; border-radius:20px; border:2px solid; font-size:11px; font-weight:600; cursor:pointer; transition:opacity .15s; }
.kw-chip:not(.active) { opacity:.35; }

.content { padding:20px 28px; }
.card { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; margin-bottom:16px; }
.card h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
canvas { max-height:260px; }

.kpi-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.kpi { background:#FDFAF5; border-radius:14px; border:1px solid #E5D9C8; padding:14px 18px; flex:1; min-width:130px; }
.kpi-label { font-size:11px; font-weight:700; margin-bottom:4px; }
.kpi-val { font-size:26px; font-weight:800; }
.kpi-sub { font-size:10px; color:#A89070; margin-top:2px; }
.kpi-trend { font-size:11px; font-weight:600; margin-top:4px; }

.related-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.related-box { background:#F7F1E8; border-radius:10px; padding:12px; }
.related-box h4 { font-size:11px; font-weight:700; margin-bottom:8px; color:#5C4A32; }
.related-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.related-item .bar { height:5px; border-radius:3px; flex-shrink:0; }
.related-item .qtext { font-size:11px; color:#333; }

.note { font-size:10px; color:#A89070; margin-top:8px; }

@media(max-width:768px) {
  .grid2,.related-grid { grid-template-columns:1fr; }
  .filter-bar,.content { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🔍 Google 搜尋趨勢</h1>
    <p>品牌搜尋聲量 · 週趨勢 · 地區對比（資料來源：Google Trends）</p>
  </div>
  <a class="back-link" href="competitors.html">← 返回互動率總覽</a>
</div>

<div class="filter-bar">
  <span class="filter-label">地區</span>
  <div class="region-toggle">
    <button class="region-btn active" onclick="setRegion('us',this)">🇺🇸 全美</button>
    <button class="region-btn" onclick="setRegion('ca',this)">☀️ 加州</button>
  </div>
  <span class="filter-label" style="margin-left:8px">品牌</span>
  <div class="kw-chips" id="kwChips"></div>
</div>
<div class="date-bar">
  <span style="font-size:11px;font-weight:600;color:#8B7355;">時間範圍</span>
  <button class="date-btn" onclick="setWeekRange(4,this)">近4週</button>
  <button class="date-btn" onclick="setWeekRange(8,this)">近8週</button>
  <button class="date-btn" onclick="setWeekRange(13,this)">近3個月</button>
  <button class="date-btn active" onclick="setWeekRange(26,this)">近6個月</button>
  <button class="date-btn" onclick="setWeekRange(52,this)">近1年</button>
  <button class="date-btn" onclick="setWeekRange(0,this)">全部</button>
  <span class="date-info" id="dateInfo"></span>
</div>

<div class="content">
  <div class="kpi-row" id="kpiRow"></div>

  <div class="card">
    <h3>📈 搜尋聲量週趨勢（過去 12 個月，相對指數 0–100）</h3>
    <canvas id="trendChart"></canvas>
    <p class="note">Google Trends 指數為相對值，100 = 該期間最高搜尋量，非絕對搜尋次數</p>
  </div>

  <div class="grid2">
    <div class="card">
      <h3>📊 近 4 週平均聲量排行</h3>

    </div>
    <div class="card">
      <h3>📅 月份聲量對比（過去 3 個月）</h3>
      <canvas id="monthChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>🔎 相關搜尋詞（人們搜尋品牌時一起搜什麼）</h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>

    chip.style.color = b.color;
    chip.textContent = b.label;
    chip.addEventListener('click', () => {
      if (activeKws.has(kw)) {
        if (activeKws.size <= 1) return;
        activeKws.delete(kw);
        chip.classList.remove('active');
      } else {
        activeKws.add(kw);
        chip.classList.add('active');
      }
      renderAll();
    });
    container.appendChild(chip);
  });
}

function setRegion(r, btn) {
  currentRegion = r;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function destroyChart(id) {
  if (_charts[id]) { try { _charts[id].destroy(); } catch(e){} delete _charts[id]; }
}

function getData() {
  const all = __TRENDS__[currentRegion] || [];
  return weekLimit ? all.slice(-weekLimit) : all;
}

// ── KPI cards ────────────────────────────────────────────────
function renderKPI() {
  const rows = getData();
  const last4 = rows.slice(-4);
  const row = document.getElementById('kpiRow');
  row.innerHTML = '';

  BRAND_KEYS.filter(kw => activeKws.has(kw)).forEach(kw => {
    const b = __TRENDS__.brands[kw];
    const recent = last4.map(r => r[kw] || 0);
    const avg = recent.reduce((a,v)=>a+v,0) / recent.length;
    const prev4 = rows.slice(-8,-4).map(r => r[kw] || 0);
    const prevAvg = prev4.length ? prev4.reduce((a,v)=>a+v,0)/prev4.length : 0;
    const trend = prevAvg ? ((avg-prevAvg)/prevAvg*100) : 0;
    const trendTxt = trend > 0 ? `▲ ${trend.toFixed(0)}%` : trend < 0 ? `▼ ${Math.abs(trend).toFixed(0)}%` : '–';
    const trendColor = trend > 0 ? '#16a34a' : trend < 0 ? '#dc2626' : '#aaa';
    row.innerHTML += `<div class="kpi">
      <div class="kpi-label" style="color:${b.color}">${b.label}</div>
      <div class="kpi-val">${avg.toFixed(0)}</div>
      <div class="kpi-sub">近4週平均指數</div>
      <div class="kpi-trend" style="color:${trendColor}">${trendTxt} vs 前4週</div>
    </div>`;
  });
}

// ── Trend line chart ─────────────────────────────────────────
function renderTrend() {
  const rows = getData();
  const labels = rows.map(r => r.date?.slice(0,10) || '');
  destroyChart('trend');
  _charts.trend = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: BRAND_KEYS.filter(kw => activeKws.has(kw)).map(kw => {
        const b = __TRENDS__.brands[kw];
        return {
          label: b.label,
          data: rows.map(r => r[kw] ?? null),
          borderColor: b.color,
          backgroundColor: b.color + '18',
          pointRadius: 2,
          pointHoverRadius: 5,
          borderWidth: 2,
          tension: .35,
          fill: false,
          spanGaps: true,
        };
      })
    },
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: { legend:{ position:'bottom', labels:{boxWidth:12,font:{size:11},padding:10} } },
      scales: {
        x: { ticks:{ maxTicksLimit:12, font:{size:10}, maxRotation:45 } },
        y: { min:0, max:100, title:{display:true,text:'搜尋指數'} }
      }
    }
  });
}

// ── Rank bar chart ───────────────────────────────────────────
function renderRank() {
  const rows = getData();
  const last4 = rows.slice(-4);
  const active = BRAND_KEYS.filter(kw => activeKws.has(kw));
  const avgs = active.map(kw => last4.reduce((s,r)=>s+(r[kw]||0),0)/last4.length);
  const sorted = active.map((kw,i)=>({kw, avg:avgs[i]})).sort((a,z)=>z.avg-a.avg);

  destroyChart('rank');
  _charts.rank = new Chart(document.getElementById('rankChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(d => __TRENDS__.brands[d.kw].label),
      datasets: [{ data: sorted.map(d=>+d.avg.toFixed(1)), backgroundColor: sorted.map(d=>__TRENDS__.brands[d.kw].color), borderRadius:8 }]
    },
    options: {
      responsive: true, indexAxis:'y',
      plugins:{ legend:{display:false} },
      scales:{ x:{max:100, title:{display:true,text:'搜尋指數'}} }
    }
  });
}

// ── Month bar chart ──────────────────────────────────────────
function renderMonth() {
  const rows = getData();
  const months = {};
  rows.forEach(r => {
    const m = (r.date||'').slice(0,7);
    if (!months[m]) months[m] = {};
    BRAND_KEYS.forEach(kw => {
      if (!months[m][kw]) months[m][kw] = [];
      if (r[kw] != null) months[m][kw].push(r[kw]);
    });
  });
  const last3 = Object.keys(months).sort().slice(-3);

  destroyChart('month');
  _charts.month = new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: {
      labels: last3,
      datasets: BRAND_KEYS.filter(kw=>activeKws.has(kw)).map(kw => {
        const b = __TRENDS__.brands[kw];
        return {
          label: b.label,
          data: last3.map(m => {
            const vals = (months[m]||{})[kw]||[];
            return vals.length ? +(vals.reduce((a,v)=>a+v,0)/vals.length).toFixed(1) : 0;
          }),
          backgroundColor: b.color + 'cc',
          borderRadius: 4,
        };
      })
    },
    options: {
      responsive: true,
      plugins: { legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}} },
      scales: { y:{max:100,title:{display:true,text:'搜尋指數'}} }
    }
  });
}

// ── Related queries ──────────────────────────────────────────
function renderRelated() {
  const grid = document.getElementById('relatedGrid');
  const colors = { heytea:'#FF4D6D', chagee:'#06B6D4', boba_general:'#9CA3AF' };
  const labels = { heytea:'Hey Tea 相關搜尋', chagee:'Chagee 相關搜尋', boba_general:'手搖飲整體趨勢' };
  grid.innerHTML = Object.entries(__TRENDS__.related).map(([key, queries]) => {
    const maxV = 100;
    const rows = queries.map(q => {
      const w = Math.round(100/queries.length * (queries.length - queries.indexOf(q)));
      return `<div class="related-item">
        <div class="bar" style="width:${w}px;max-width:80px;background:${colors[key]||'#ccc'};opacity:.7"></div>
        <span class="qtext">${q}</span>
      </div>`;
    }).join('');
    return `<div class="related-box">
      <h4 style="color:${colors[key]||'#888'}">${labels[key]||key}</h4>
      ${rows}
    </div>`;
  }).join('');
}

function renderAll() {
  const rows = getRows();
  const el = document.getElementById('dateInfo');
  if (el && rows.length) {
    el.textContent = `${rows[0].date} ~ ${rows[rows.length-1].date}，共 ${rows.length} 週資料`;
  }
  renderKPI();
  renderTrend();
  renderRank();
  renderMonth();
  renderRelated();
}

initChips();
renderAll();
</script>
</body>
</html>
