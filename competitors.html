<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競品互動率分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F5EFE6; color:#2C1E0F; }
.header { background:#FDFAF5; padding:20px 28px; border-bottom:1px solid #E5D9C8; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:12px; color:#9B8670; margin-top:3px; }
.nav-links { display:flex; gap:12px; }
.nav-links a { font-size:12px; color:#B87030; text-decoration:none; white-space:nowrap; }

.filter-bar { background:#FDFAF5; border-bottom:1px solid #E5D9C8; padding:12px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.filter-label { font-size:12px; font-weight:600; color:#8B7355; white-space:nowrap; }
.filter-presets { display:flex; gap:6px; flex-wrap:wrap; }
.preset-btn { padding:5px 11px; border-radius:20px; border:1px solid #e5e5e5; background:#FDFAF5; font-size:12px; font-weight:500; color:#5C4A32; cursor:pointer; }
.preset-btn.active { background:#5C3D2E; color:#fff; border-color:#2C1E0F; }
.date-inputs { display:flex; align-items:center; gap:6px; }
.date-inputs input[type=date] { padding:4px 8px; border:1px solid #e5e5e5; border-radius:8px; font-size:12px; color:#333; outline:none; }
.filter-info { margin-left:auto; font-size:11px; color:#A89070; }

.ranking { padding:20px 28px 0; }
.ranking h2 { font-size:13px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
.rank-table { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; overflow:hidden; }
.rank-row { display:grid; grid-template-columns:36px 1fr 90px 90px 90px 90px 80px; align-items:center; padding:12px 16px; border-bottom:1px solid #EDE5D8; gap:8px; }
.rank-row:last-child { border-bottom:none; }
.rank-row.header-row { background:#F7F1E8; font-size:11px; font-weight:600; color:#9B8670; text-transform:uppercase; letter-spacing:.4px; padding:8px 16px; }
.sortable { cursor:pointer; user-select:none; display:flex; align-items:center; gap:4px; }
.sortable:hover { color:#5C3D2E; }
.sort-arrow { font-size:10px; opacity:0.4; }
.sort-arrow.active { opacity:1; color:#B87030; }
.rank-num { font-size:14px; font-weight:700; color:#C4B09A; text-align:center; }
.rank-num.gold { color:#F59E0B; }
.rank-num.silver { color:#9CA3AF; }
.rank-num.bronze { color:#B45309; }
.brand-name { display:flex; align-items:center; gap:10px; }
.brand-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.brand-label { font-size:13px; font-weight:600; }
.brand-followers { font-size:11px; color:#A89070; }
.metric { text-align:right; font-size:13px; font-weight:600; }
.metric.highlight { color:#5A7A3A; }
.metric.note { font-size:11px; color:#A89070; font-weight:400; }
.bar-cell { position:relative; height:6px; background:#EDE5D8; border-radius:3px; overflow:hidden; }
.bar-fill { position:absolute; left:0; top:0; height:100%; border-radius:3px; }
.badge { display:inline-block; padding:2px 7px; border-radius:8px; font-size:10px; font-weight:600; margin-left:6px; }
.badge.viral { background:#FDF0D8; color:#8C5E20; }

.charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px 28px; }
.chart-box { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; }
.chart-box h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.chart-box canvas { max-height:220px; }
.full { grid-column:1/-1; }
.full canvas { max-height:260px; }

.top-posts { padding:0 28px 28px; }
.top-posts h2 { font-size:13px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
.posts-scroll { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; }
.post-card { background:#FDFAF5; border-radius:12px; border:1px solid #E5D9C8; width:180px; flex-shrink:0; overflow:hidden; }
.post-card img { width:100%; height:140px; object-fit:cover; display:block; background:#EDE5D8; }
.post-card-body { padding:10px; }
.post-brand { font-size:10px; font-weight:700; text-transform:uppercase; }
.post-eng { font-size:16px; font-weight:700; margin-top:2px; }
.post-stats { font-size:10px; color:#A89070; margin-top:2px; }
.post-cap { font-size:11px; color:#5C4A32; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.post-link { font-size:10px; color:#B87030; text-decoration:none; display:block; margin-top:4px; }

@media(max-width:768px) {
  .charts { grid-template-columns:1fr; }
  .full { grid-column:auto; }
  .rank-row { grid-template-columns:28px 1fr 70px 70px; }
  .rank-row > *:nth-child(5), .rank-row > *:nth-child(6), .rank-row > *:nth-child(7) { display:none; }
  .ranking,.charts,.top-posts,.filter-bar { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 競品互動率分析</h1>
    <p>7 個品牌 · SoCal 茶飲市場</p>
  </div>
  <div class="nav-links">
    <a href="engagement.html">📈 週趨勢</a>
    <a href="insights.html">🔍 深度洞察</a>
    <a href="growth.html">👥 成長分析</a>
    <a href="trends.html">🔎 搜尋趨勢</a>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">📅 時間範圍</span>
  <div class="filter-presets">
    <button class="preset-btn" data-days="7">近 7 天</button>
    <button class="preset-btn" data-days="30">近 30 天</button>
    <button class="preset-btn active" data-days="60">近 60 天</button>
    <button class="preset-btn" data-days="90">近 90 天</button>
    <button class="preset-btn" data-days="365">近 1 年</button>
    <button class="preset-btn" data-days="0">全部</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom">
    <span style="font-size:12px;color:#A89070">—</span>
    <input type="date" id="dateTo">
  </div>
  <span class="filter-info" id="filterInfo"></span>
</div>

<div class="ranking">
  <h2>互動率排行</h2>
  <div class="rank-table">
    <div class="rank-row header-row">
      <div>#</div>
      <div class="sortable" data-sort="followers" style="justify-content:flex-start">粉絲 <span class="sort-arrow">↓</span></div>
      <div class="sortable" data-sort="medEng" style="text-align:right;justify-content:flex-end">互動率 <span class="sort-arrow active">↓</span></div>
      <div class="sortable" data-sort="avgEng" style="text-align:right;justify-content:flex-end">平均互動率 <span class="sort-arrow">↓</span></div>
      <div class="sortable" data-sort="avgLikes" style="text-align:right;justify-content:flex-end">平均讚 <span class="sort-arrow">↓</span></div>
      <div class="sortable" data-sort="postCount" style="text-align:right;justify-content:flex-end">週發文 <span class="sort-arrow">↓</span></div>
      <div></div>
    </div>
    <div id="rankBody"></div>
  </div>
</div>

<div class="charts">
  <div class="chart-box full">
    <h3>互動率排行對比（中位數）</h3>
    <canvas id="engBarChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>內容類型 × 平均互動率</h3>
    <canvas id="typeChart"></canvas>
  </div>
  <div class="chart-box">
    <h3>粉絲規模 vs 互動率</h3>
    <canvas id="scatterChart"></canvas>
  </div>
</div>

<div class="top-posts">
  <h2>各品牌最高互動貼文</h2>
  <div class="posts-scroll" id="topPosts"></div>
</div>

<script>
var __DATA__, LOGOS, __TOP_POSTS__;
const MY_BRAND = 'sunright'; // Soma's own brand

let _charts = {};
let _currentSort = { field: 'medEng', desc: true };
let _lastFilteredData = null;

function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a,b)=>a-b);
  const m = Math.floor(s.length/2);
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}
function avg(arr) {
  const v = arr.filter(x=>x>=0);
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0;
}
function fmt(n) {
  if (n==null||n<0) return '–';
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000) return (n/1000).toFixed(1)+'K';
  return Math.round(n).toString();
}

// ── Date filter ──────────────────────────────────────────────
function getAllDates() {
  const all = [];
  Object.values(__DATA__).forEach(b => b.posts.forEach(p => { if(p.date) all.push(p.date); }));
  return all.sort();
}
let _allDates, _maxDate, _minDate;

function setPreset(days) {
  const toD = new Date(_maxDate);
  let fromD;
  if (days===0) { fromD = new Date(_minDate); }
  else { fromD = new Date(toD); fromD.setDate(fromD.getDate()-days+1); if(fromD<new Date(_minDate)) fromD=new Date(_minDate); }
  document.getElementById('dateFrom').value = fromD.toISOString().slice(0,10);
  document.getElementById('dateTo').value   = toD.toISOString().slice(0,10);
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const filtered = {};
  let total = 0;
  Object.entries(__DATA__).forEach(([key,b]) => {
    const posts = b.posts.filter(p => {
      if (!p.date) return false;
      if (from && p.date < from) return false;
      if (to   && p.date > to)   return false;
      return true;
    });
    filtered[key] = { ...b, posts };
    total += posts.length;
  });
  document.getElementById('filterInfo').textContent = `${from} ～ ${to}　共 ${total} 篇貼文`;
  render(filtered);
}

function startApp() {
  _allDates = getAllDates();
  _maxDate = _allDates[_allDates.length-1];
  _minDate = _allDates[0];
  setPreset(60);
  applyFilter();

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      setPreset(Number(btn.dataset.days));
      applyFilter();
    });
  });
  ['dateFrom','dateTo'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
      applyFilter();
    });
  });

  // Sort click handlers
  document.querySelectorAll('.sortable').forEach(el => {
    el.addEventListener('click', () => {
      const field = el.dataset.sort;
      if (_currentSort.field === field) {
        _currentSort.desc = !_currentSort.desc;
      } else {
        _currentSort.field = field;
        _currentSort.desc = true;
      }
      if (_lastFilteredData) render(_lastFilteredData);
    });
  });
}

// ── Render ───────────────────────────────────────────────────
function render(data) {
  Object.values(_charts).forEach(c => { try{c.destroy();}catch(e){} });
  _charts = {};

  _lastFilteredData = data;
  const brands = Object.entries(data).map(([key,b]) => {
    const posts = b.posts.filter(p => p.eng >= 0);
    if (!posts.length) return null;
    const likes    = posts.map(p=>p.likes);
    const comments = posts.map(p=>p.comments);
    const engs     = posts.map(p=>p.eng);
    const medEng   = median(engs);
    const avgEng   = avg(engs);
    const avgLikes = avg(likes);
    const avgComments = avg(comments);
    const maxLikes = Math.max(...likes.filter(l=>l>=0), 0);
    const hasViral = maxLikes > b.followers * 0.5;
    const postCount = posts.length;
    return { key, ...b, posts, avgEng, medEng, avgLikes, avgComments, hasViral, postCount };
  }).filter(Boolean);
  
  // Sort by current sort field
  const sortField = _currentSort.field;
  brands.sort((a,b) => {
    const va = a[sortField] || 0;
    const vb = b[sortField] || 0;
    return _currentSort.desc ? (vb - va) : (va - vb);
  });

  if (!brands.length) {
    document.getElementById('rankBody').innerHTML = '<div style="padding:20px;text-align:center;color:#A89070">此區間無資料</div>';
    return;
  }

  const rankNums = ['🥇','🥈','🥉'];
  // Update sort arrows
  document.querySelectorAll('.sortable .sort-arrow').forEach(arrow => {
    const field = arrow.parentElement.dataset.sort;
    arrow.classList.toggle('active', field === _currentSort.field);
    arrow.textContent = (field === _currentSort.field && !_currentSort.desc) ? '↑' : '↓';
  });

  const topVal = brands[0] ? brands[0][_currentSort.field] : 1;
  document.getElementById('rankBody').innerHTML = brands.map((b,i) => {
    const isMe = b.key === MY_BRAND;
    const pct = topVal ? ((b[_currentSort.field] || 0) / topVal * 100).toFixed(0) : 0;
    return `<div class="rank-row" style="${isMe?'background:#F0F8F1;border-left:3px solid #1a7a3a;':''}">
      <div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i<3?rankNums[i]:i+1}</div>
      <div class="brand-name">
        ${LOGOS[b.key]
          ? `<img src="${LOGOS[b.key]}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0">`
          : `<div class="brand-dot" style="background:${b.color}"></div>`}
        <div>
          <div class="brand-label">${b.name}${b.key===MY_BRAND?'<span class="badge" style="background:#1a7a3a;color:#fff;margin-left:4px">⭐ 我的品牌</span>':''}${b.hasViral?'<span class="badge viral">含爆款</span>':''}</div>
          <div class="brand-followers">${fmt(b.followers)} 粉絲 · ${b.posts.length} 篇</div>
        </div>
      </div>
      <div class="metric highlight">${b.medEng.toFixed(2)}%</div>
      <div class="metric note">${b.avgEng.toFixed(2)}%</div>
      <div class="metric">${fmt(b.avgLikes)}</div>
      <div class="metric">${b.postCount} 篇</div>
      <div><div class="bar-cell"><div class="bar-fill" style="width:${pct}%;background:${b.color}"></div></div></div>
    </div>`;
  }).join('');

  _charts.bar = new Chart(document.getElementById('engBarChart'), {
    type:'bar',
    data:{ labels:brands.map(b=>b.name), datasets:[{
      label:'中位數互動率 (%)', data:brands.map(b=>b.medEng),
      backgroundColor:brands.map(b=>b.color), borderRadius:8
    }]},
    options:{ responsive:true, indexAxis:'y', plugins:{legend:{display:false}},
      scales:{x:{ticks:{callback:v=>v+'%'}}} }
  });

  const types = ['Image','Video','Sidecar'];
  const typeLabels = ['圖片','影片','多圖'];
  // Cap y-axis at 95th percentile to avoid viral outliers squishing other bars
  const allTypeVals = [];
  brands.forEach(b => types.forEach(t => {
    const tp = b.posts.filter(p=>p.type===t&&p.eng>=0);
    if (tp.length) allTypeVals.push(avg(tp.map(p=>p.eng)));
  }));
  const sortedVals = [...allTypeVals].sort((a,b)=>a-b);
  const p95 = sortedVals[Math.floor(sortedVals.length*0.95)] || 20;
  const typeYMax = Math.ceil(p95 * 1.2);

  _charts.type = new Chart(document.getElementById('typeChart'), {
    type:'bar',
    data:{ labels:typeLabels, datasets:brands.map(b=>({
      label:b.name,
      data:types.map(t=>{const tp=b.posts.filter(p=>p.type===t&&p.eng>=0);return tp.length?avg(tp.map(p=>p.eng)):null;}),
      backgroundColor:b.color, borderRadius:4,
    }))},
    options:{ responsive:true,
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}},
        tooltip:{callbacks:{label:ctx=>ctx.parsed.y!=null?` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`:null}}
      },
      scales:{y:{max:typeYMax, ticks:{callback:v=>v?.toFixed(1)+'%'},
        title:{display:true,text:`（爆款離群值已截斷，上限 ${typeYMax.toFixed(0)}%）`,font:{size:9},color:'#A89070'}
      }}
    }
  });

  _charts.scatter = new Chart(document.getElementById('scatterChart'), {
    type:'scatter',
    data:{ datasets:brands.map(b=>({
      label:b.name, data:[{x:b.followers,y:b.medEng}],
      backgroundColor:b.color, pointRadius:10, pointHoverRadius:12
    }))},
    options:{ responsive:true,
      plugins:{ legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.x)} 粉絲, ${ctx.parsed.y.toFixed(2)}%`}} },
      scales:{
        x:{title:{display:true,text:'粉絲數'},ticks:{callback:v=>fmt(v)}},
        y:{title:{display:true,text:'互動率 (%)'},ticks:{callback:v=>v+'%'}}
      } }
  });

  // Use pre-embedded images from __TOP_POSTS__ if available
  const topPosts = brands.map(b => {
    const embedded = typeof __TOP_POSTS__ !== 'undefined' ? __TOP_POSTS__[b.key] : null;
    if (embedded) return {...embedded, brandName:b.name, brandColor:b.color};
    const best = [...b.posts].filter(p=>p.eng>=0).sort((a,z)=>z.eng-a.eng)[0];
    return best ? {...best, key:b.key, brandName:b.name, brandColor:b.color} : null;
  }).filter(Boolean);

  document.getElementById('topPosts').innerHTML = topPosts.map(p => `
    <div class="post-card">
      ${p.embeddedImg?`<img src="${p.embeddedImg}">`:p.img?`<img src="${p.img}" loading="lazy">`:'<div style="width:100%;height:140px;background:#EDE5D8"></div>'}
      <div class="post-card-body">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
          ${LOGOS[p.key]?`<img src="${LOGOS[p.key]}" style="width:16px;height:16px;border-radius:50%;object-fit:cover">`:''}
          <span class="post-brand" style="color:${p.brandColor}">${p.brandName}</span>
        </div>
        <div class="post-eng">${p.eng.toFixed(2)}%</div>
        <div class="post-stats">❤️${fmt(p.likes)} 💬${fmt(p.comments)} · ${p.date}</div>
        <div class="post-cap">${p.caption||'–'}</div>
        <a class="post-link" href="${p.url}" target="_blank">查看 →</a>
      </div>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded', function() {
  document.body.style.opacity = '0.5';
  Promise.all([
    fetch('data/posts.json').then(r=>r.json()),
    fetch('data/logos.json').then(r=>r.json()),
    fetch('data/top_posts.json').then(r=>r.json()).catch(()=>({})),
  ]).then(function(results) {
    __DATA__ = results[0];
    LOGOS = results[1];
    __TOP_POSTS__ = results[2];
    document.body.style.opacity = '1';
    startApp();
  }).catch(function(e) {
    console.error('資料載入失敗:', e);
    document.body.style.opacity = '1';
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red">資料載入失敗，請重新整理頁面</div>';
  });
});
</script>
</body>
</html>
