<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競品深度洞察</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F5EFE6; color:#2C1E0F; }

.header { background:#FDFAF5; padding:20px 28px; border-bottom:1px solid #E5D9C8; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:12px; color:#9B8670; margin-top:3px; }
.back-link { font-size:12px; color:#B87030; text-decoration:none; }

.tabs { background:#FDFAF5; border-bottom:1px solid #E5D9C8; display:flex; padding:0 28px; }
.tab-btn { padding:12px 18px; font-size:13px; font-weight:600; color:#9B8670; border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
.tab-btn.active { color:#2C1E0F; border-bottom-color:#2C1E0F; }

.filter-bar { background:#FDFAF5; border-bottom:1px solid #E5D9C8; padding:10px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.date-bar { background:#F7F1E8; border-bottom:1px solid #E5D9C8; padding:8px 28px; display:flex; align-items:center; gap:8px; }
.date-btn { padding:4px 12px; border-radius:20px; border:1px solid #D5C5B0; background:#FDFAF5; font-size:11px; color:#5C4A32; cursor:pointer; }
.date-btn.active { background:#B87030; color:#fff; border-color:#B87030; }
.date-info { margin-left:auto; font-size:11px; color:#A89070; }
.filter-label { font-size:12px; font-weight:600; color:#8B7355; }
.brand-chip { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 6px; border-radius:20px; border:1px solid #e5e5e5; background:#FDFAF5; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; color:#fff; }
.brand-chip img { width:18px; height:18px; border-radius:50%; object-fit:cover; }
.brand-chip:not(.active) { opacity:.4; }

.tab-content { display:none; padding:20px 28px; }
.tab-content.active { display:block; }

.card { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; }
.card h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.full-card { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; margin-bottom:20px; }
.full-card h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }

.heatmap-wrap { overflow-x:auto; }
.heatmap { border-collapse:collapse; font-size:10px; min-width:700px; width:100%; }
.heatmap th { padding:3px 4px; color:#A89070; font-weight:500; text-align:center; font-size:9px; }
.heatmap th.row-header { text-align:left; padding-right:8px; color:#8B7355; white-space:nowrap; }
.heatmap td { width:30px; height:26px; text-align:center; border-radius:3px; font-size:9px; font-weight:600; cursor:default; transition:transform .1s; }
.heatmap td:hover { transform:scale(1.2); z-index:10; position:relative; }

.htag-table { width:100%; border-collapse:collapse; font-size:12px; }
.htag-table th { text-align:left; padding:6px 10px; color:#A89070; font-size:11px; font-weight:600; border-bottom:1px solid #E5D9C8; }
.htag-table td { padding:6px 10px; border-bottom:1px solid #EDE5D8; }
.htag-table tr:last-child td { border-bottom:none; }
.eng-val { font-weight:700; color:#5A7A3A; }

.day-bars { display:flex; flex-direction:column; gap:6px; }
.day-bar-row { display:flex; align-items:center; gap:8px; }
.day-name { font-size:11px; color:#8B7355; width:22px; text-align:right; flex-shrink:0; }
.day-bar-track { flex:1; background:#EDE5D8; border-radius:4px; height:18px; overflow:hidden; }
.day-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:6px; }
.day-bar-fill span { font-size:10px; color:#fff; font-weight:600; white-space:nowrap; }

.time-pills { display:flex; flex-wrap:wrap; gap:8px; }
.time-pill { background:#F5EFE6; border-radius:10px; padding:10px 14px; min-width:120px; }
.time-pill .brand-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.time-pill .brand-row img { width:18px; height:18px; border-radius:50%; }
.time-pill .best-val { font-size:18px; font-weight:800; }
.time-pill .best-label { font-size:10px; color:#A89070; }

canvas { max-height:240px; }

@media(max-width:768px) {
  .grid2 { grid-template-columns:1fr; }
  .tabs,.filter-bar,.tab-content { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🔍 競品深度洞察</h1>
    <p>發文時段 · Hashtag 策略 · 影片數據</p>
  </div>
  <a class="back-link" href="competitors.html">← 返回互動率總覽</a>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtnTiming" onclick="switchTab('timing',this)">⏰ 最佳時段</button>
  <button class="tab-btn" id="tabBtnHashtag" onclick="switchTab('hashtag',this)">＃ Hashtag 策略</button>
  <button class="tab-btn" id="tabBtnVideo" onclick="switchTab('video',this)">🎬 影片數據</button>
</div>

<div class="filter-bar">
  <span class="filter-label">品牌篩選</span>
  <div id="brandFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
</div>
<div class="date-bar">
  <span style="font-size:11px;font-weight:600;color:#8B7355;">時間範圍</span>
  <button class="date-btn" onclick="setDateRange(7,this)">近7天</button>
  <button class="date-btn" onclick="setDateRange(30,this)">近30天</button>
  <button class="date-btn active" onclick="setDateRange(60,this)">近60天</button>
  <button class="date-btn" onclick="setDateRange(90,this)">近90天</button>
  <button class="date-btn" onclick="setDateRange(365,this)">近1年</button>
  <button class="date-btn" onclick="setDateRange(0,this)">全部</button>
  <span class="date-info" id="dateInfo"></span>
</div>

<!-- TAB 1: TIMING -->
<div class="tab-content active" id="tab-timing">
  <div class="full-card">
    <h3>📅 發文日 × 時段互動率熱力圖（PST，平均互動率 %）</h3>
    <div class="heatmap-wrap">
      <table class="heatmap" id="heatmapTable"></table>
    </div>
    <p style="font-size:10px;color:#C4B09A;margin-top:8px">顏色越深 = 互動率越高。灰色格 = 無資料。</p>
  </div>
  <div class="grid2">
    <div class="card">
      <h3>🕐 各品牌最佳發文時段</h3>
      <div class="time-pills" id="bestHourPills"></div>
    </div>
    <div class="card">
      <h3>📆 各品牌最佳發文日（週幾互動最高）</h3>
      <div id="bestDayBars"></div>
    </div>
  </div>
  <div class="full-card">
    <h3>📊 各時段平均互動率（所有品牌合計）</h3>
    <div style="position:relative;height:260px"><canvas id="hourChart"></canvas></div>
  </div>
</div>

<!-- TAB 2: HASHTAG -->
<div class="tab-content" id="tab-hashtag">
  <div class="grid2">
    <div class="card" style="overflow:auto;max-height:520px">
      <h3>🔢 最常用標籤 Top 30（出現次數）</h3>
      <table class="htag-table" id="htagFreqTable"></table>
    </div>
    <div class="card" style="overflow:auto;max-height:520px">
      <h3>🚀 標籤 × 平均互動率（≥3 次使用）</h3>
      <table class="htag-table" id="htagEngTable"></table>
    </div>
  </div>
  <div class="full-card">
    <h3>📌 各品牌專屬標籤 Top 10</h3>
    <div id="brandHtagGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;"></div>
  </div>
</div>

<!-- TAB 3: VIDEO -->
<div class="tab-content" id="tab-video">
  <div class="grid2">
    <div class="card">
      <h3>📹 Reels 播放數 vs 互動率（各貼文）</h3>
      <canvas id="videoScatter"></canvas>
    </div>
    <div class="card">
      <h3>⏱ 影片時長 vs 平均互動率</h3>
      <canvas id="durationChart"></canvas>
    </div>
  </div>
  <div class="full-card">
    <h3>🏆 最高播放量 Reels Top 8</h3>
    <div id="topVideos" style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;"></div>
  </div>
</div>

<script>
var __DATA__, LOGOS;

const DAYS = ['一','二','三','四','五','六','日'];
const HOURS = Array.from({length:24},(_,i)=>i);
const HOUR_LABELS = HOURS.map(h => h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm');
const MY_BRAND = 'sunright';
let activebrands;
let _charts = {};
let dateCutoff = 60;

function setDateRange(days, btn) {
  dateCutoff = days;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── Brand filter chips ───────────────────────────────────────
function initFilters() {
  const container = document.getElementById('brandFilters');
  Object.entries(__DATA__).forEach(([key, b]) => {
    const chip = document.createElement('div');
    chip.className = 'brand-chip active';
    chip.dataset.key = key;
    chip.style.background = b.color;
    chip.style.borderColor  = b.color;
    chip.innerHTML = (LOGOS[key] ? `<img src="${LOGOS[key]}">` : '') + b.name;
    chip.addEventListener('click', () => {
      if (activebrands.has(key)) {
        if (activebrands.size <= 1) return;
        activebrands.delete(key);
        chip.classList.remove('active');
        chip.style.background = '#fff';
        chip.style.color = b.color;
        chip.style.borderColor = b.color;
      } else {
        activebrands.add(key);
        chip.classList.add('active');
        chip.style.background = b.color;
        chip.style.color = '#fff';
        chip.style.borderColor = b.color;
      }
      renderAll();
    });
    container.appendChild(chip);
  });
}

function getFilteredPosts() {
  const cutoff = dateCutoff ? (() => { const d = new Date(); d.setDate(d.getDate() - dateCutoff); return d.toISOString().slice(0,10); })() : null;
  const posts = [];
  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    b.posts.forEach(p => {
      if (p.eng >= 0 && (!cutoff || p.date >= cutoff)) posts.push({...p, key, brandColor:b.color, brandName:b.name});
    });
  });
  return posts;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function destroyChart(id) {
  if (_charts[id]) { try { _charts[id].destroy(); } catch(e){} delete _charts[id]; }
}

// ── colour scale ─────────────────────────────────────────────
function heatColor(val, max) {
  if (val == null) return {bg:'#f5f5f7', txt:'#ccc'};
  const t = Math.min(val / max, 1);
  const r = Math.round(22 + (1-t)*233);
  const g = Math.round(163 + (1-t)*92);
  const b = Math.round(74 + (1-t)*181);
  return {bg:`rgb(${r},${g},${b})`, txt: t > 0.45 ? '#fff' : '#555'};
}

// ── TIMING ───────────────────────────────────────────────────
function renderTiming() {
  const posts = getFilteredPosts().filter(p => p.hour != null && p.dow != null);

  // 7×24 grid
  const grid = Array.from({length:7}, () => Array.from({length:24}, () => ({sum:0,n:0})));
  posts.forEach(p => { grid[p.dow][p.hour].sum += p.eng; grid[p.dow][p.hour].n++; });
  const avgs = grid.map(row => row.map(c => c.n >= 1 ? c.sum/c.n : null));
  const maxVal = Math.max(...avgs.flat().filter(v=>v!=null), 0.01);

  // Table
  let html = '<tr><th class="row-header"></th>';
  HOUR_LABELS.forEach(h => html += `<th>${h}</th>`);
  html += '</tr>';
  DAYS.forEach((day, d) => {
    html += `<tr><th class="row-header">週${day}</th>`;
    avgs[d].forEach((v, h) => {
      const {bg, txt} = heatColor(v, maxVal);
      const label = v != null ? v.toFixed(1) : '';
      html += `<td style="background:${bg};color:${txt}" title="週${day} ${HOUR_LABELS[h]}: ${v!=null?v.toFixed(2)+'%':'無資料'}">${label}</td>`;
    });
    html += '</tr>';
  });
  document.getElementById('heatmapTable').innerHTML = html;

  // Best hour per brand
  const pills = document.getElementById('bestHourPills');
  pills.innerHTML = '';
  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    const byH = {};
    b.posts.filter(p=>p.eng>=0&&p.hour!=null).forEach(p => {
      if (!byH[p.hour]) byH[p.hour] = {sum:0,n:0};
      byH[p.hour].sum += p.eng; byH[p.hour].n++;
    });
    const best = Object.entries(byH).sort((a,z)=>(z[1].sum/z[1].n)-(a[1].sum/a[1].n))[0];
    if (!best) return;
    const h = parseInt(best[0]);
    const label = h===0?'12 am':h<12?h+' am':h===12?'12 pm':(h-12)+' pm';
    const isMe = key === MY_BRAND;
    pills.innerHTML += `<div class="time-pill" style="${isMe?'border:2px solid #1a7a3a;background:#F0F8F1;':''}">
      <div class="brand-row">${LOGOS[key]?`<img src="${LOGOS[key]}">`:''}<span style="font-size:11px;font-weight:700;color:${b.color}">${b.name}</span>${isMe?'<span style="font-size:9px;background:#1a7a3a;color:#fff;border-radius:6px;padding:0 4px;margin-left:3px">⭐</span>':''}</div>
      <div class="best-val">${label}</div>
      <div class="best-label">互動率 ${(best[1].sum/best[1].n).toFixed(2)}%</div>
    </div>`;
  });

  // Best day of week
  const byDow = Array.from({length:7}, ()=>({sum:0,n:0}));
  posts.forEach(p => { byDow[p.dow].sum += p.eng; byDow[p.dow].n++; });
  const dowAvgs = byDow.map(d => d.n ? d.sum/d.n : 0);
  const maxDow = Math.max(...dowAvgs, 0.01);
  document.getElementById('bestDayBars').innerHTML = '<div class="day-bars">' +
    DAYS.map((d,i) => {
      const v = dowAvgs[i];
      const pct = (v/maxDow*100).toFixed(0);
      return `<div class="day-bar-row">
        <div class="day-name">週${d}</div>
        <div class="day-bar-track"><div class="day-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#10b981,#34d399)"><span>${v.toFixed(2)}%</span></div></div>
      </div>`;
    }).join('') + '</div>';

  // Hour line chart
  const hourAvgs = HOURS.map(h => {
    const vals = posts.filter(p=>p.hour===h).map(p=>p.eng);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  });
  destroyChart('hour');
  _charts.hour = new Chart(document.getElementById('hourChart'), {
    type:'line',
    data:{ labels:HOUR_LABELS, datasets:[{
      label:'平均互動率 %', data:hourAvgs,
      borderColor:'#10b981', backgroundColor:'rgba(16,185,129,.12)',
      fill:true, tension:.4, pointRadius:3,
    }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ y:{ticks:{callback:v=>v.toFixed(1)+'%'}} } }
  });
}

// ── HASHTAG ──────────────────────────────────────────────────
function renderHashtag() {
  const posts = getFilteredPosts();
  const hmap = {};
  posts.forEach(p => {
    (p.hashtags||[]).forEach(tag => {
      const t = tag.toLowerCase();
      if (!hmap[t]) hmap[t] = {count:0, engSum:0, brands:new Set()};
      hmap[t].count++; hmap[t].engSum += p.eng; hmap[t].brands.add(p.key);
    });
  });

  // Top 30 by frequency
  const byFreq = Object.entries(hmap).sort((a,z)=>z[1].count-a[1].count).slice(0,30);
  const maxC = byFreq[0]?.[1]?.count || 1;
  let freqHtml = '<tr><th>#</th><th>標籤</th><th>次數</th><th>品牌數</th></tr>';
  byFreq.forEach(([tag,v],i) => {
    const w = Math.round(v.count/maxC*80);
    freqHtml += `<tr>
      <td style="color:#C4B09A;width:24px">${i+1}</td>
      <td style="font-weight:600">#${tag}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div style="width:${w}px;height:5px;background:#0095f6;border-radius:3px;opacity:.7"></div>${v.count}
      </div></td>
      <td style="color:#A89070">${v.brands.size}</td>
    </tr>`;
  });
  document.getElementById('htagFreqTable').innerHTML = freqHtml;

  // Top by engagement (min 3 uses)
  const byEng = Object.entries(hmap)
    .filter(([,v])=>v.count>=3)
    .map(([tag,v])=>[tag, v.engSum/v.count, v.count])
    .sort((a,z)=>z[1]-a[1]).slice(0,30);
  const maxE = byEng[0]?.[1] || 0.01;
  let engHtml = '<tr><th>#</th><th>標籤</th><th>平均互動率</th><th>次數</th></tr>';
  byEng.forEach(([tag,eng,cnt],i) => {
    const w = Math.round(eng/maxE*80);
    engHtml += `<tr>
      <td style="color:#C4B09A;width:24px">${i+1}</td>
      <td style="font-weight:600">#${tag}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div style="width:${w}px;height:5px;background:#10b981;border-radius:3px;opacity:.8"></div>
        <span class="eng-val">${eng.toFixed(2)}%</span>
      </div></td>
      <td style="color:#A89070">${cnt}</td>
    </tr>`;
  });
  document.getElementById('htagEngTable').innerHTML = engHtml;

  // Per-brand top hashtags
  const grid = document.getElementById('brandHtagGrid');
  grid.innerHTML = '';
  Object.entries(__DATA__).forEach(([key,b]) => {
    if (!activebrands.has(key)) return;
    const bmap = {};
    b.posts.forEach(p => (p.hashtags||[]).forEach(tag => {
      const t = tag.toLowerCase();
      if (!bmap[t]) bmap[t] = {count:0, engSum:0};
      bmap[t].count++; bmap[t].engSum += (p.eng >= 0 ? p.eng : 0);
    }));
    const top = Object.entries(bmap).sort((a,z)=>z[1].count-a[1].count).slice(0,10);
    const maxC2 = top[0]?.[1]?.count || 1;
    const rows = top.map(([tag,v]) => {
      const w = Math.round(v.count/maxC2*70);
      const eng = v.count ? (v.engSum/v.count).toFixed(2) : '–';
      return `<tr>
        <td style="padding:4px 8px;font-size:11px">#${tag}</td>
        <td style="padding:4px 4px"><div style="width:${w}px;height:5px;background:${b.color};border-radius:3px;opacity:.7"></div></td>
        <td style="padding:4px 6px;font-size:11px;color:#A89070">${v.count}次</td>
        <td style="padding:4px 8px;font-size:11px;font-weight:700;color:#5A7A3A">${eng}%</td>
      </tr>`;
    }).join('');
    grid.innerHTML += `<div style="background:#FDFAF5;border-radius:14px;border:1px solid #E5D9C8;padding:14px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">
        ${LOGOS[key]?`<img src="${LOGOS[key]}" style="width:22px;height:22px;border-radius:50%">`:''}<span style="font-size:12px;font-weight:700;color:${b.color}">${b.name}</span>
      </div>
      <table style="width:100%;border-collapse:collapse">${rows}</table>
    </div>`;
  });
}

// ── VIDEO ────────────────────────────────────────────────────
function renderVideo() {
  const allVideos = [];
  Object.entries(__DATA__).forEach(([key,b]) => {
    if (!activebrands.has(key)) return;
    b.posts.filter(p=>p.type==='Video'&&p.videoPlayCount&&p.eng>=0).forEach(p => {
      allVideos.push({...p, key, brandColor:b.color, brandName:b.name});
    });
  });

  destroyChart('scatter');
  _charts.scatter = new Chart(document.getElementById('videoScatter'), {
    type:'scatter',
    data:{ datasets: [...activebrands].map(key => {
      const b = __DATA__[key];
      const vids = b.posts.filter(p=>p.type==='Video'&&p.videoPlayCount&&p.eng>=0);
      return { label:b.name, data:vids.map(p=>({x:p.videoPlayCount,y:p.eng})), backgroundColor:b.color+'bb', pointRadius:7 };
    }).filter(d=>d.data.length) },
    options:{ responsive:true,
      plugins:{ legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x>=1000?(ctx.parsed.x/1000).toFixed(1)+'K':ctx.parsed.x} 播放, ${ctx.parsed.y.toFixed(2)}%`}} },
      scales:{
        x:{title:{display:true,text:'播放次數'},ticks:{callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}},
        y:{title:{display:true,text:'互動率 %'},ticks:{callback:v=>v+'%'}}
      }
    }
  });

  const buckets = {'<10s':{sum:0,n:0},'10–20s':{sum:0,n:0},'20–30s':{sum:0,n:0},'>30s':{sum:0,n:0}};
  allVideos.filter(p=>p.videoDuration).forEach(p => {
    const d = p.videoDuration;
    const k = d<10?'<10s':d<20?'10–20s':d<30?'20–30s':'>30s';
    buckets[k].sum += p.eng; buckets[k].n++;
  });
  destroyChart('duration');
  _charts.duration = new Chart(document.getElementById('durationChart'), {
    type:'bar',
    data:{ labels:Object.keys(buckets),
      datasets:[{ label:'平均互動率 %',
        data:Object.values(buckets).map(v=>v.n ? +(v.sum/v.n).toFixed(3) : 0),
        backgroundColor:['#a78bfa','#60a5fa','#34d399','#fb923c'], borderRadius:8 }]
    },
    options:{ responsive:true, plugins:{legend:{display:false}},
      scales:{ y:{ticks:{callback:v=>v.toFixed(1)+'%'}} } }
  });

  const top8 = [...allVideos].sort((a,z)=>z.videoPlayCount-a.videoPlayCount).slice(0,8);
  const fmt = n => n>=1000?(n/1000).toFixed(1)+'K':n;
  document.getElementById('topVideos').innerHTML = top8.map(p => `
    <div style="background:#FDFAF5;border-radius:12px;border:1px solid #E5D9C8;width:170px;flex-shrink:0;overflow:hidden">
      ${p.img?`<img src="${p.img}" style="width:100%;height:130px;object-fit:cover;display:block;background:#EDE5D8">`:'<div style="width:100%;height:130px;background:#EDE5D8"></div>'}
      <div style="padding:10px">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          ${LOGOS[p.key]?`<img src="${LOGOS[p.key]}" style="width:16px;height:16px;border-radius:50%">`:''}<span style="font-size:10px;font-weight:700;color:${p.brandColor}">${p.brandName}</span>
        </div>
        <div style="font-size:15px;font-weight:800">▶ ${fmt(p.videoPlayCount)}</div>
        <div style="font-size:10px;color:#A89070">互動率 ${p.eng.toFixed(2)}% · ${p.date}</div>
        <div style="font-size:10px;color:#5C4A32;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.caption||'–'}</div>
        <a href="${p.url}" target="_blank" style="font-size:10px;color:#B87030;text-decoration:none;display:block;margin-top:4px">查看 →</a>
      </div>
    </div>`).join('');
}

function renderAll() {
  const posts = getFilteredPosts();
  const el = document.getElementById('dateInfo');
  if (el && posts.length) {
    const dates = posts.map(p=>p.date).filter(Boolean).sort();
    el.textContent = `${dates[0]} ~ ${dates[dates.length-1]}，共 ${posts.length} 篇貼文`;
  }
  renderTiming();
  renderHashtag();
  renderVideo();
}

function startApp() {
  activebrands = new Set(Object.keys(__DATA__));
  initFilters();
  renderAll();
}

document.addEventListener('DOMContentLoaded', function() {
  document.body.style.opacity = '0.5';
  Promise.all([
    fetch('data/posts.json').then(r=>r.json()),
    fetch('data/logos.json').then(r=>r.json()),
  ]).then(function(results) {
    __DATA__ = results[0];
    LOGOS = results[1];
    document.body.style.opacity = '1';
    startApp();
  }).catch(function(e) {
    console.error('資料載入失敗:', e);
    document.body.style.opacity = '1';
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red">資料載入失敗，請重新整理頁面</div>';
  });
});
</script>
</body>
</html>
