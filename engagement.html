<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F5EFE6; color:#2C1E0F; }

.header { background:#FDFAF5; padding:20px 28px; border-bottom:1px solid #E5D9C8; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:12px; color:#9B8670; margin-top:3px; }
.back-link { font-size:12px; color:#B87030; text-decoration:none; }

/* Filter bar */
.filter-bar { background:#FDFAF5; border-bottom:1px solid #E5D9C8; padding:10px 28px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.filter-label { font-size:12px; font-weight:600; color:#8B7355; white-space:nowrap; }
.brand-chip { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 6px; border-radius:20px; border:1px solid #e5e5e5; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; color:#fff; }
.brand-chip img { width:18px; height:18px; border-radius:50%; object-fit:cover; }
.brand-chip:not(.active) { opacity:.4; }
.metric-toggle { display:flex; gap:4px; margin-left:auto; }
.metric-btn { padding:5px 12px; border-radius:20px; border:1px solid #e5e5e5; background:#FDFAF5; font-size:11px; font-weight:600; color:#5C4A32; cursor:pointer; }
.metric-btn.active { background:#5C3D2E; color:#fff; border-color:#2C1E0F; }

/* KPI row */
.kpi-row { display:flex; gap:12px; padding:16px 28px; flex-wrap:wrap; overflow-x:auto; }
.kpi { background:#FDFAF5; border-radius:14px; border:1px solid #E5D9C8; padding:14px 18px; min-width:140px; flex:1; }
.kpi-brand { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.kpi-brand img { width:20px; height:20px; border-radius:50%; }
.kpi-brand span { font-size:11px; font-weight:700; }
.kpi-val { font-size:24px; font-weight:800; }
.kpi-sub { font-size:10px; color:#A89070; margin-top:2px; }
.kpi-trend { font-size:11px; font-weight:600; margin-top:4px; }

/* Charts */
.chart-section { padding:0 28px 20px; }
.chart-box { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; margin-bottom:16px; }
.chart-box h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.chart-box canvas { max-height:280px; }

/* Weekly table */
.week-table { width:100%; border-collapse:collapse; font-size:12px; }
.week-table th { padding:8px 12px; text-align:left; color:#A89070; font-size:11px; font-weight:600; border-bottom:2px solid #E5D9C8; white-space:nowrap; }
.week-table td { padding:7px 12px; border-bottom:1px solid #EDE5D8; }
.week-table tr:last-child td { border-bottom:none; }
.week-table tr:hover td { background:#F7F1E8; }
.rank-badge { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; font-size:10px; font-weight:700; }

@media(max-width:768px) {
  .filter-bar, .kpi-row, .chart-section { padding-left:16px; padding-right:16px; }
}
</style>
</head>

let activebrands = new Set(Object.keys(__DATA__));
let currentMetric = 'eng';
let _chart = null;

// ── Brand filter chips ───────────────────────────────────────
function initFilters() {
  const container = document.getElementById('brandFilters');
  Object.entries(__DATA__).forEach(([key, b]) => {
    const chip = document.createElement('div');
    chip.className = 'brand-chip active';
    chip.style.background = b.color;
    chip.style.borderColor = b.color;
    chip.innerHTML = (LOGOS[key] ? `<img src="${LOGOS[key]}">` : '') + b.name;
    chip.addEventListener('click', () => {
      if (activebrands.has(key)) {
        if (activebrands.size <= 1) return;
        activebrands.delete(key);
        chip.classList.remove('active');
        chip.style.background = '#fff';
        chip.style.color = b.color;
        chip.style.borderColor = b.color;
      } else {
        activebrands.add(key);
        chip.classList.add('active');
        chip.style.background = b.color;
        chip.style.color = '#fff';
        chip.style.borderColor = b.color;
      }
      renderAll();
    });
    container.appendChild(chip);
  });
}

function setMetric(m, btn) {
  currentMetric = m;
  document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = { eng:'📊 每週互動率趨勢', likes:'👍 每週平均讚數趨勢', posts:'📅 每週發文數量趨勢' };
  document.getElementById('trendTitle').textContent = titles[m];
  renderAll();
}

// ── Build weekly data ────────────────────────────────────────
function getWeeklyData() {
  const allWeeks = new Set();
  const brandWeeks = {};

  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    const wmap = {};
    b.posts.filter(p => p.week && p.eng >= 0).forEach(p => {
      if (!wmap[p.week]) wmap[p.week] = { engSum:0, likes:0, n:0 };
      wmap[p.week].engSum += p.eng;
      wmap[p.week].likes  += Math.max(p.likes, 0);
      wmap[p.week].n++;
      allWeeks.add(p.week);
    });
    brandWeeks[key] = wmap;
  });

  const weeks = [...allWeeks].sort();
  return { weeks, brandWeeks };
}

// ── KPI cards ────────────────────────────────────────────────
function renderKPI() {
  const { weeks, brandWeeks } = getWeeklyData();
  const lastWeeks = weeks.slice(-4); // last 4 weeks

  const row = document.getElementById('kpiRow');
  row.innerHTML = '';

  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    const wmap = brandWeeks[key] || {};

    // Average engagement over last 4 weeks
    const recent = lastWeeks.map(w => wmap[w]).filter(Boolean);
    const avgEng = recent.length
      ? recent.reduce((s,d) => s + d.engSum/d.n, 0) / recent.length
      : 0;

    // Trend: compare last 2 weeks vs 2 weeks before that
    const last2  = lastWeeks.slice(-2).map(w=>wmap[w]).filter(Boolean);
    const prev2  = lastWeeks.slice(0,2).map(w=>wmap[w]).filter(Boolean);
    const last2avg = last2.length  ? last2.reduce((s,d)=>s+d.engSum/d.n,0)/last2.length : 0;
    const prev2avg = prev2.length  ? prev2.reduce((s,d)=>s+d.engSum/d.n,0)/prev2.length : 0;
    const trendPct = prev2avg ? ((last2avg - prev2avg) / prev2avg * 100) : 0;
    const trendTxt = trendPct > 0 ? `▲ ${trendPct.toFixed(1)}%` : trendPct < 0 ? `▼ ${Math.abs(trendPct).toFixed(1)}%` : '—';
    const trendColor = trendPct > 0 ? '#16a34a' : trendPct < 0 ? '#dc2626' : '#aaa';

    row.innerHTML += `<div class="kpi">
      <div class="kpi-brand">
        ${LOGOS[key] ? `<img src="${LOGOS[key]}">` : ''}
        <span style="color:${b.color}">${b.name}</span>
      </div>
      <div class="kpi-val">${avgEng.toFixed(2)}%</div>
      <div class="kpi-sub">近4週平均互動率</div>
      <div class="kpi-trend" style="color:${trendColor}">${trendTxt} 週趨勢</div>
    </div>`;
  });
}

// ── Trend chart ──────────────────────────────────────────────
function renderTrendChart() {
  const { weeks, brandWeeks } = getWeeklyData();
  if (_chart) { try { _chart.destroy(); } catch(e){} }

  const labels = weeks.map(w => {
    // Format: "W08" → readable
    const [yr, wn] = w.split('-W');
    return `${yr} W${wn}`;
  });

  const datasets = [...activebrands].map(key => {
    const b = __DATA__[key];
    const wmap = brandWeeks[key] || {};
    const data = weeks.map(w => {
      const d = wmap[w];
      if (!d) return null;
      if (currentMetric === 'eng')   return +(d.engSum/d.n).toFixed(3);
      if (currentMetric === 'likes') return +(d.likes/d.n).toFixed(1);
      if (currentMetric === 'posts') return d.n;
    });
    return {
      label: b.name,
      data,
      borderColor: b.color,
      backgroundColor: b.color + '22',
      pointBackgroundColor: b.color,
      borderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: .35,
      spanGaps: true,
    };
  });

  const yLabel = currentMetric === 'eng' ? '互動率 %' : currentMetric === 'likes' ? '平均讚數' : '貼文數';
  const yCb = currentMetric === 'eng' ? v => v+'%' : v => v >= 1000 ? (v/1000).toFixed(1)+'K' : v;

  _chart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { position:'bottom', labels:{ boxWidth:12, font:{size:11}, padding:12 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.parsed.y == null) return null;
              const v = ctx.parsed.y;
              return ` ${ctx.dataset.label}: ${currentMetric==='eng' ? v.toFixed(2)+'%' : currentMetric==='likes' ? (v>=1000?(v/1000).toFixed(1)+'K':v) : v+'篇'}`;
            }
          }
        }
      },
      scales: {
        x: { ticks:{ font:{size:10}, maxRotation:45 } },
        y: { title:{ display:true, text:yLabel }, ticks:{ callback:yCb } }
      }
    }
  });
}

// ── Weekly table ─────────────────────────────────────────────
function renderWeekTable() {
  const { weeks, brandWeeks } = getWeeklyData();
  const brandList = [...activebrands].map(key => ({ key, ...(__DATA__[key]) }));
  const recentWeeks = weeks.slice(-12); // show last 12 weeks

  let html = '<tr><th>週次</th>' +
    brandList.map(b => `<th><div style="display:flex;align-items:center;gap:4px">${LOGOS[b.key]?`<img src="${LOGOS[b.key]}" style="width:14px;height:14px;border-radius:50%">`:''}<span style="color:${b.color}">${b.name}</span></div></th>`).join('') +
    '</tr>';

  recentWeeks.slice().reverse().forEach(w => {
    const [yr, wn] = w.split('-W');
    const label = `${yr} W${wn}`;

    // Find best brand this week
    const weekEngs = brandList.map(b => {
      const d = (brandWeeks[b.key] || {})[w];
      return d ? d.engSum/d.n : null;
    });
    const maxEng = Math.max(...weekEngs.filter(v=>v!=null));

    html += `<tr><td style="font-weight:600;color:#8B7355;white-space:nowrap">${label}</td>` +
      brandList.map((b, i) => {
        const d = (brandWeeks[b.key] || {})[w];
        if (!d) return '<td style="color:#D4C4B0">–</td>';
        const eng = d.engSum/d.n;
        const isTop = Math.abs(eng - maxEng) < 0.001;
        const val = currentMetric === 'eng'   ? eng.toFixed(2)+'%'
                  : currentMetric === 'likes' ? (d.likes/d.n >= 1000 ? (d.likes/d.n/1000).toFixed(1)+'K' : Math.round(d.likes/d.n).toString())
                  : d.n+'篇';
        return `<td style="font-weight:${isTop?'700':'400'};color:${isTop?b.color:'#333'}">${isTop?'★ ':''}${val}</td>`;
      }).join('') +
      '</tr>';
  });

  document.getElementById('weekTable').innerHTML = html;
}

function renderAll() {
  renderKPI();
  renderTrendChart();
  renderWeekTable();
}

initFilters();
renderAll();
</script>
