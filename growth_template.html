<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成長 & 發文頻率分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#F5EFE6; color:#2C1E0F; }
.header { background:#FDFAF5; padding:20px 28px; border-bottom:1px solid #E5D9C8; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:700; }
.header p { font-size:12px; color:#9B8670; margin-top:3px; }
.back-link { font-size:12px; color:#B87030; text-decoration:none; }

.tabs { background:#FDFAF5; border-bottom:1px solid #E5D9C8; display:flex; padding:0 28px; }
.tab-btn { padding:12px 18px; font-size:13px; font-weight:600; color:#9B8670; border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; }
.tab-btn.active { color:#2C1E0F; border-bottom-color:#2C1E0F; }

.filter-bar { background:#FDFAF5; border-bottom:1px solid #E5D9C8; padding:10px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.date-bar { background:#F7F1E8; border-bottom:1px solid #E5D9C8; padding:8px 28px; display:flex; align-items:center; gap:8px; }
.date-btn { padding:4px 12px; border-radius:20px; border:1px solid #D5C5B0; background:#FDFAF5; font-size:11px; color:#5C4A32; cursor:pointer; }
.date-btn.active { background:#B87030; color:#fff; border-color:#B87030; }
.date-info { margin-left:auto; font-size:11px; color:#A89070; }
.filter-label { font-size:12px; font-weight:600; color:#8B7355; white-space:nowrap; }
.brand-chip { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 6px; border-radius:20px; border:1px solid; font-size:11px; font-weight:600; cursor:pointer; transition:opacity .15s; color:#fff; }
.brand-chip img { width:18px; height:18px; border-radius:50%; }
.brand-chip:not(.active) { opacity:.35; }

.tab-content { display:none; padding:20px 28px; }
.tab-content.active { display:block; }
.card { background:#FDFAF5; border-radius:16px; border:1px solid #E5D9C8; padding:18px; margin-bottom:16px; }
.card h3 { font-size:12px; font-weight:600; color:#8B7355; text-transform:uppercase; letter-spacing:.4px; margin-bottom:14px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
canvas { max-height:260px; }

.kpi-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.kpi { background:#FDFAF5; border-radius:14px; border:1px solid #E5D9C8; padding:14px 18px; flex:1; min-width:130px; }
.kpi-brand { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.kpi-brand img { width:20px; height:20px; border-radius:50%; }
.kpi-brand span { font-size:11px; font-weight:700; }
.kpi-val { font-size:22px; font-weight:800; }
.kpi-sub { font-size:10px; color:#A89070; margin-top:2px; }

.freq-table { width:100%; border-collapse:collapse; font-size:12px; }
.freq-table th { padding:8px 10px; text-align:left; color:#A89070; font-size:11px; font-weight:600; border-bottom:2px solid #E5D9C8; }
.freq-table td { padding:7px 10px; border-bottom:1px solid #EDE5D8; }
.freq-bar { height:6px; border-radius:3px; }

.notice { background:#FDFAF5beb; border:1px solid #fde68a; border-radius:10px; padding:14px 18px; margin-bottom:16px; }
.notice strong { color:#8C5E20; }
.notice p { font-size:12px; color:#92400e; margin-top:4px; }

@media(max-width:768px) {
  .grid2 { grid-template-columns:1fr; }
  .filter-bar,.tab-content { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📈 成長 & 發文分析</h1>
    <p>粉絲成長趨勢 · 發文頻率 · 內容組合</p>
  </div>
  <a class="back-link" href="competitors.html">← 返回互動率總覽</a>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('growth',this)">👥 粉絲成長</button>
  <button class="tab-btn" onclick="switchTab('posting',this)">📅 發文頻率</button>
  <button class="tab-btn" onclick="switchTab('mix',this)">🎨 內容組合</button>
</div>

<div class="filter-bar">
  <span class="filter-label">品牌</span>
  <div id="brandFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
</div>
<div class="date-bar">
  <span style="font-size:11px;font-weight:600;color:#8B7355;">時間範圍</span>
  <button class="date-btn" onclick="setDateRange(7,this)">近7天</button>
  <button class="date-btn" onclick="setDateRange(30,this)">近30天</button>
  <button class="date-btn active" onclick="setDateRange(60,this)">近60天</button>
  <button class="date-btn" onclick="setDateRange(90,this)">近90天</button>
  <button class="date-btn" onclick="setDateRange(365,this)">近1年</button>
  <button class="date-btn" onclick="setDateRange(0,this)">全部</button>
  <span class="date-info" id="dateInfo"></span>
</div>

<!-- TAB 1: GROWTH -->
<div class="tab-content active" id="tab-growth">
  <div class="notice" id="growthNotice">
    <strong>⏳ 資料累積中</strong>
    <p>粉絲成長追蹤已啟動，每週一早上自動記錄各品牌粉絲數。2-4 週後就能看到成長趨勢圖！</p>
  </div>
  <div class="kpi-row" id="followerKPI"></div>
  <div class="card">
    <h3>📊 粉絲數趨勢（每週記錄）</h3>
    <canvas id="growthChart"></canvas>
  </div>
</div>

<!-- TAB 2: POSTING FREQUENCY -->
<div class="tab-content" id="tab-posting">
  <div class="kpi-row" id="postingKPI"></div>
  <div class="card">
    <h3>📅 每週發文數量趨勢</h3>
    <canvas id="postingChart"></canvas>
  </div>
  <div class="card">
    <h3>📋 各週發文明細</h3>
    <div style="overflow-x:auto;">
      <table class="freq-table" id="freqTable"></table>
    </div>
  </div>
</div>

<!-- TAB 3: CONTENT MIX -->
<div class="tab-content" id="tab-mix">
  <div class="grid2">
    <div class="card">
      <h3>📸 各品牌內容類型分布</h3>
      <canvas id="mixChart"></canvas>
    </div>
    <div class="card">
      <h3>📈 內容類型趨勢（近 12 週）</h3>
      <canvas id="mixTrendChart"></canvas>
    </div>
  </div>
</div>

<script>
var __DATA__, __HISTORY__, LOGOS;

const MY_BRAND = 'sunright';
let activebrands;
let dateCutoff = 60;

function setDateRange(days, btn) {
  dateCutoff = days;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFilteredPosts(posts) {
  if (!dateCutoff) return posts;
  const d = new Date(); d.setDate(d.getDate() - dateCutoff);
  const cutoff = d.toISOString().slice(0,10);
  return posts.filter(p => p.date >= cutoff);
}
let _charts = {};

function initFilters() {
  const container = document.getElementById('brandFilters');
  Object.entries(__DATA__).forEach(([key, b]) => {
    const chip = document.createElement('div');
    chip.className = 'brand-chip active';
    chip.style.background = b.color;
    chip.style.borderColor = b.color;
    chip.innerHTML = (LOGOS[key] ? `<img src="${LOGOS[key]}">` : '') + b.name;
    chip.addEventListener('click', () => {
      if (activebrands.has(key)) {
        if (activebrands.size <= 1) return;
        activebrands.delete(key);
        chip.classList.remove('active');
        chip.style.background = '#fff';
        chip.style.color = b.color;
      } else {
        activebrands.add(key);
        chip.classList.add('active');
        chip.style.background = b.color;
        chip.style.color = '#fff';
      }
      renderAll();
    });
    container.appendChild(chip);
  });
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function destroyChart(id) {
  if (_charts[id]) { try { _charts[id].destroy(); } catch(e){} delete _charts[id]; }
}

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

// ── GROWTH TAB ───────────────────────────────────────────────
function renderGrowth() {
  // Show/hide notice based on data points
  const allDates = new Set();
  Object.values(__HISTORY__).forEach(arr => arr.forEach(d => allDates.add(d.date)));
  const hasMultiple = allDates.size > 1;
  document.getElementById('growthNotice').style.display = hasMultiple ? 'none' : 'block';

  // KPI: current followers
  const kpiRow = document.getElementById('followerKPI');
  kpiRow.innerHTML = '';
  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    kpiRow.innerHTML += `<div class="kpi">
      <div class="kpi-brand">${LOGOS[key]?`<img src="${LOGOS[key]}">`:''}<span style="color:${b.color}">${b.name}</span></div>
      <div class="kpi-val">${fmt(b.followers)}</div>
      <div class="kpi-sub">目前粉絲數</div>
    </div>`;
  });

  // Growth chart (if data exists)
  const dates = [...allDates].sort();
  if (dates.length > 0) {
    destroyChart('growth');
    _charts.growth = new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: {
        labels: dates,
        datasets: [...activebrands].map(key => {
          const b = __DATA__[key];
          const hist = __HISTORY__[key] || [];
          const dateMap = {};
          hist.forEach(d => dateMap[d.date] = d.followers);
          return {
            label: b.name,
            data: dates.map(d => dateMap[d] || null),
            borderColor: b.color,
            backgroundColor: b.color + '22',
            pointRadius: 4,
            borderWidth: 2,
            tension: .3,
            spanGaps: true,
          };
        })
      },
      options: {
        responsive: true,
        plugins: { legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}} },
        scales: { y:{ticks:{callback:v=>fmt(v)}} }
      }
    });
  }
}

// ── POSTING TAB ──────────────────────────────────────────────
function renderPosting() {
  // Build weekly post counts
  const weekMap = {};
  Object.entries(__DATA__).forEach(([key, b]) => {
    if (!activebrands.has(key)) return;
    getFilteredPosts(b.posts).forEach(p => {
      if (!p.week) return;
      if (!weekMap[p.week]) weekMap[p.week] = {};
      if (!weekMap[p.week][key]) weekMap[p.week][key] = 0;
      weekMap[p.week][key]++;
    });
  });
  const weeks = Object.keys(weekMap).sort().slice(-20);

  // KPI: avg posts per week
  const kpiRow = document.getElementById('postingKPI');
  kpiRow.innerHTML = '';
  [...activebrands].forEach(key => {
    const b = __DATA__[key];
    const counts = weeks.map(w => (weekMap[w]||{})[key] || 0);
    const avg = counts.reduce((a,v)=>a+v,0) / counts.length;
    kpiRow.innerHTML += `<div class="kpi">
      <div class="kpi-brand">${LOGOS[key]?`<img src="${LOGOS[key]}">`:''}<span style="color:${b.color}">${b.name}</span></div>
      <div class="kpi-val">${avg.toFixed(1)}</div>
      <div class="kpi-sub">平均每週發文</div>
    </div>`;
  });

  // Chart
  destroyChart('posting');
  _charts.posting = new Chart(document.getElementById('postingChart'), {
    type: 'line',
    data: {
      labels: weeks.map(w => { const [y,wn]=w.split('-W'); return `W${wn}`; }),
      datasets: [...activebrands].map(key => {
        const b = __DATA__[key];
        return {
          label: b.name,
          data: weeks.map(w => (weekMap[w]||{})[key] || 0),
          borderColor: b.color,
          backgroundColor: b.color + '22',
          pointRadius: 3,
          borderWidth: 2,
          tension: .3,
        };
      })
    },
    options: {
      responsive: true,
      plugins: { legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}} },
      scales: { y:{beginAtZero:true,title:{display:true,text:'發文數'}} }
    }
  });

  // Table
  const brandList = [...activebrands].map(k => ({key:k, ...(__DATA__[k])}));
  let html = '<tr><th>週次</th>' + brandList.map(b => `<th style="color:${b.color}">${b.name}</th>`).join('') + '</tr>';
  weeks.slice().reverse().forEach(w => {
    const [y,wn] = w.split('-W');
    html += `<tr><td style="font-weight:600;color:#8B7355">W${wn}</td>` +
      brandList.map(b => {
        const cnt = (weekMap[w]||{})[b.key] || 0;
        const maxW = Math.max(...brandList.map(x=>(weekMap[w]||{})[x.key]||0), 1);
        const pct = cnt/maxW*100;
        return `<td><div style="display:flex;align-items:center;gap:8px">
          <div class="freq-bar" style="width:${pct}px;max-width:60px;background:${b.color};opacity:.7"></div>
          ${cnt}
        </div></td>`;
      }).join('') + '</tr>';
  });
  document.getElementById('freqTable').innerHTML = html;
}

// ── MIX TAB ──────────────────────────────────────────────────
function renderMix() {
  // Stacked bar: content type per brand
  const types = ['Image','Video','Sidecar'];
  const typeLabels = ['圖片','影片','多圖'];
  const typeColors = ['#60a5fa','#f472b6','#34d399'];
  const brandList = [...activebrands].map(k => ({key:k, ...(__DATA__[k])}));

  destroyChart('mix');
  _charts.mix = new Chart(document.getElementById('mixChart'), {
    type: 'bar',
    data: {
      labels: brandList.map(b => b.name),
      datasets: types.map((t,i) => ({
        label: typeLabels[i],
        data: brandList.map(b => getFilteredPosts(b.posts).filter(p=>p.type===t).length),
        backgroundColor: typeColors[i],
        borderRadius: 4,
      }))
    },
    options: {
      responsive: true,
      plugins: { legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}} },
      scales: { x:{stacked:true}, y:{stacked:true,title:{display:true,text:'貼文數'}} }
    }
  });

  // Content mix trend over time
  const weekMap = {};
  Object.entries(__DATA__).forEach(([key,b]) => {
    if (!activebrands.has(key)) return;
    getFilteredPosts(b.posts).forEach(p => {
      if (!p.week) return;
      if (!weekMap[p.week]) weekMap[p.week] = {Image:0,Video:0,Sidecar:0};
      if (types.includes(p.type)) weekMap[p.week][p.type]++;
    });
  });
  const weeks = Object.keys(weekMap).sort().slice(-12);

  destroyChart('mixTrend');
  _charts.mixTrend = new Chart(document.getElementById('mixTrendChart'), {
    type: 'line',
    data: {
      labels: weeks.map(w => { const [y,wn]=w.split('-W'); return `W${wn}`; }),
      datasets: types.map((t,i) => ({
        label: typeLabels[i],
        data: weeks.map(w => (weekMap[w]||{})[t] || 0),
        borderColor: typeColors[i],
        backgroundColor: typeColors[i] + '22',
        pointRadius: 3,
        borderWidth: 2,
        tension: .3,
        fill: true,
      }))
    },
    options: {
      responsive: true,
      plugins: { legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}} },
      scales: { y:{stacked:true,title:{display:true,text:'貼文數'}} }
    }
  });
}

function renderAll() {
  const allPosts = Object.values(__DATA__).flatMap(b => getFilteredPosts(b.posts));
  const el = document.getElementById('dateInfo');
  if (el && allPosts.length) {
    const dates = allPosts.map(p=>p.date).filter(Boolean).sort();
    el.textContent = `${dates[0]} ~ ${dates[dates.length-1]}，共 ${allPosts.length} 篇貼文`;
  }
  renderGrowth();
  renderPosting();
  renderMix();
}

function startApp() {
  activebrands = new Set(Object.keys(__DATA__));
  initFilters();
  renderAll();
}

document.addEventListener('DOMContentLoaded', function() {
  document.body.style.opacity = '0.5';
  Promise.all([
    fetch('data/posts.json').then(r=>r.json()),
    fetch('data/logos.json').then(r=>r.json()),
    fetch('data/follower_history.json').then(r=>r.json()),
  ]).then(function(results) {
    __DATA__ = results[0];
    LOGOS = results[1];
    __HISTORY__ = results[2];
    document.body.style.opacity = '1';
    startApp();
  }).catch(function(e) {
    console.error('資料載入失敗:', e);
    document.body.style.opacity = '1';
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:red">資料載入失敗，請重新整理頁面</div>';
  });
});
</script>
</body>
</html>
